name: CI

# Quality gate: lint, type-check, and build on every push to main and every PR.
# Deployment (CD) is handled by the host's Git integration (e.g. Cloudflare
# Pages), which auto-deploys main and creates preview URLs for PRs.

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, type-check & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Build
        run: npm run build
